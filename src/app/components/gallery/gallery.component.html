<section id="gallery" class="gallery section-padding">
  <div class="container">
    <div class="gallery__header">
      <div class="gallery__title-block">
        <span class="section-subtitle">ВІЗУАЛЬНА ЕСТЕТИКА</span>
        <h2 class="section-title">ГАСТРОНОМІЧНА <span class="blue-text">ГАЛЕРЕЯ</span></h2>
      </div>
    </div>

    <div class="carousel">
      <button class="carousel__arrow prev" (click)="prev()">&#10229;</button>

      <div class="carousel__viewport">
        <div class="carousel__track" [style.transform]="'translateX(-' + (currentIndex * (100 / itemsVisible)) + '%)'">
          <div class="carousel__slide" *ngFor="let item of galleryItems">
            <div class="carousel__image-container">
              <img [src]="item.src" [alt]="item.title">
              <div class="carousel__caption">
                <span class="category">{{ item.category }}</span>
                <h3>{{ item.title }}</h3>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="carousel__arrow next" (click)="next()">&#10230;</button>
    </div>
  </div>
</section>
